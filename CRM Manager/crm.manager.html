<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CRM Manager — Contact Priority</title>
<style>
  :root {
    --bg: #fafaf7;
    --card: #ffffff;
    --border: #ece8e6;
    --text: #1c1917;
    --muted: #78716c;
    --accent: #dc2626;
    --accent-soft: #fef2f2;
    --accent-strong: #991b1b;
    --danger: #dc2626;
    --warn: #d97706;
    --ok: #059669;
    --row-hover: #fdf6f6;
    --shadow-sm: 0 1px 2px rgba(28, 25, 23, 0.04);
    --shadow-md: 0 1px 3px rgba(28, 25, 23, 0.06), 0 1px 2px rgba(28, 25, 23, 0.04);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 14px; line-height: 1.4; }
  header { background: var(--card); border-bottom: 1px solid var(--border);
    padding: 22px 28px 20px; position: relative; }
  header::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent) 0%, var(--accent-strong) 100%); }
  header h1 { margin: 0 0 4px; font-size: 20px; font-weight: 600; letter-spacing: -0.01em; }
  header h1::before { content: ''; display: inline-block; width: 8px; height: 8px;
    border-radius: 50%; background: var(--accent); margin-right: 10px;
    vertical-align: middle; transform: translateY(-1px); }
  header p { margin: 0; color: var(--muted); font-size: 13px; }
  main { max-width: 1280px; margin: 24px auto; padding: 0 24px; }
  .toolbar { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .toolbar input[type="search"] {
    flex: 1; min-width: 220px; padding: 9px 12px; border: 1px solid var(--border);
    border-radius: 8px; background: var(--card); font-size: 14px; outline: none;
    box-shadow: var(--shadow-sm); transition: border-color 0.15s, box-shadow 0.15s;
  }
  .toolbar input[type="search"]:focus { border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.12); }
  .toolbar .stats { color: var(--muted); font-size: 13px; }
  .toolbar button {
    padding: 9px 14px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--card); cursor: pointer; font-size: 13px; font-weight: 500;
    box-shadow: var(--shadow-sm); transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  .toolbar button:hover { background: var(--row-hover); border-color: #e0d7d4; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    overflow: hidden; box-shadow: var(--shadow-md); }
  table { width: 100%; border-collapse: collapse; }
  thead th { text-align: left; font-weight: 600; font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--muted); padding: 14px;
    border-bottom: 1px solid var(--border); background: #fbf7f7; }
  tbody td { padding: 13px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr { cursor: pointer; transition: background 0.1s; }
  tbody tr:hover { background: var(--row-hover); }
  tbody tr.expanded { background: var(--accent-soft); }
  tbody tr.expanded td { border-bottom-color: rgba(220, 38, 38, 0.15); }

  .rank { font-variant-numeric: tabular-nums; color: var(--muted); font-weight: 500; width: 44px; }
  .name { font-weight: 500; }
  .mrr { font-variant-numeric: tabular-nums; white-space: nowrap; }
  .since { font-variant-numeric: tabular-nums; white-space: nowrap; color: var(--muted); font-size: 12px; }

  .score { display: inline-flex; align-items: center; justify-content: center;
    min-width: 42px; padding: 4px 8px; border-radius: 6px;
    font-variant-numeric: tabular-nums; font-weight: 600; font-size: 13px; }
  .score-hi { background: #fee2e2; color: var(--danger); }
  .score-md { background: #fef3c7; color: var(--warn); }
  .score-lo { background: #ecfdf5; color: var(--ok); }

  .pill { display: inline-block; padding: 2px 8px; border-radius: 999px;
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; }
  .pill-never { background: #fee2e2; color: var(--danger); }
  .pill-old { background: #fef3c7; color: var(--warn); }
  .pill-recent { background: #d1fae5; color: var(--ok); }
  .pill-unpaid { background: #fee2e2; color: var(--danger); }
  .pill-bound { background: #f5f5f4; color: #57534e; }

  .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; vertical-align: middle; }
  .dot-red { background: #dc2626; }
  .dot-yellow { background: #f59e0b; }
  .dot-green { background: #10b981; }
  .dot-none { background: #d1d5db; }

  .muted { color: var(--muted); font-size: 12px; }

  .breakdown { background: var(--accent-soft); padding: 16px 18px 20px 58px;
    border-top: 1px solid rgba(220, 38, 38, 0.12); }
  .breakdown h4 { margin: 0 0 12px; font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--accent-strong); font-weight: 700; }
  .signals { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 8px 16px; max-width: 760px; }
  .signal-row { display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .signal-row.miss { color: var(--muted); }
  .signal-row.hit { color: var(--text); font-weight: 500; }
  .signal-mark { display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 18px; border-radius: 50%; font-size: 11px; font-weight: 700;
    flex-shrink: 0; }
  .signal-mark.hit { background: var(--accent); color: #fff; }
  .signal-mark.miss { background: #e7e5e4; color: var(--muted); }

  thead th.sortable { cursor: pointer; user-select: none; transition: background 0.15s, color 0.15s; }
  thead th.sortable:hover { color: var(--text); background: #f6efef; }
  thead th.active { color: var(--accent-strong); }
  thead th .arrow { display: inline-block; width: 10px; margin-left: 4px; opacity: 0.35;
    font-size: 10px; transition: opacity 0.15s; }
  thead th.active .arrow { opacity: 1; color: var(--accent); }

  .info { display: inline-block; width: 14px; height: 14px; border-radius: 50%;
    background: #d1d5db; color: #fff; font-size: 10px; font-weight: 700; text-align: center;
    line-height: 14px; cursor: help; margin-left: 4px; position: relative; vertical-align: middle;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  .info:hover { background: var(--accent); }
  .info::before { content: '?'; }
  .info:hover::after {
    content: attr(data-tip);
    position: absolute;
    bottom: calc(100% + 8px);
    left: -4px;
    background: #111827; color: #fff;
    font-size: 12px; font-weight: 400;
    padding: 8px 10px; border-radius: 6px;
    width: max-content; max-width: 320px;
    text-align: left; line-height: 1.45;
    letter-spacing: normal; text-transform: none;
    z-index: 10; pointer-events: none;
    white-space: normal;
    box-shadow: 0 4px 14px rgba(0,0,0,0.15);
  }
  .info:hover::before { content: '?'; }
  .info.info-below:hover::after {
    bottom: auto; top: calc(100% + 8px);
  }

  .state { padding: 40px; text-align: center; color: var(--muted); }
  .state.error { color: var(--danger); }

  .toolbar .toggle { padding: 9px 14px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--card); cursor: pointer; font-size: 13px; font-weight: 500;
    color: var(--muted); box-shadow: var(--shadow-sm); transition: background 0.15s, color 0.15s, border-color 0.15s; }
  .toolbar .toggle:hover { background: var(--row-hover); color: var(--text); }
  .toolbar .toggle.active { background: var(--accent-soft); color: var(--accent-strong);
    border-color: #fbb6b6; }

  td.action { width: 32px; text-align: center; padding: 0 8px; }
  .row-action { opacity: 0; border: none; background: transparent; cursor: pointer;
    color: var(--muted); font-size: 16px; line-height: 1; padding: 4px 6px;
    border-radius: 4px; transition: opacity 0.15s, background 0.15s, color 0.15s; }
  tbody tr:hover .row-action { opacity: 1; }
  .row-action:hover { background: #fee2e2; color: var(--danger); }
  .row-action.restore:hover { background: #d1fae5; color: var(--ok); }

  tbody tr.excluded { opacity: 0.7; }
  tbody tr.excluded .row-action { opacity: 0.8; color: var(--ok); }
  .excluded-note { display: block; color: var(--muted); font-size: 11px;
    font-weight: 400; margin-top: 2px; font-style: italic; }
  .excluded-note::before { content: 'Excluded: '; font-style: normal; font-weight: 500;
    color: var(--accent-strong); }
</style>
</head>
<body>
<header>
  <h1>CRM Manager — Contact Priority</h1>
  <p>Active customers scored on seven equally weighted signals — one point per signal. The more points, the more we need to call them. Click a row for the breakdown.</p>
</header>
<main>
  <div class="toolbar">
    <input id="search" type="search" placeholder="Search by customer name or site…">
    <span class="stats" id="stats"></span>
    <button id="toggleEnding" class="toggle" title="Show customers with an end date set">Ending <span id="endingCount">0</span></button>
    <button id="toggleExcluded" class="toggle" title="Show customers excluded from the call list">Excluded <span id="excludedCount">0</span></button>
    <button id="refresh">Refresh</button>
  </div>
  <div class="card">
    <table>
      <thead>
        <tr id="thead-row">
          <th class="rank">#</th>
          <th class="sortable" data-sort="score">Score<span class="info info-below" data-tip="Each customer scores 0 or 1 on seven signals. The more points, the more we need to call them. Click a row to see which signals scored."></span><span class="arrow"></span></th>
          <th class="sortable" data-sort="name">Customer<span class="arrow"></span></th>
          <th class="sortable" data-sort="lastCall">Last called<span class="arrow"></span></th>
          <th class="sortable" data-sort="satisfaction">Sat.<span class="arrow"></span></th>
          <th class="sortable" data-sort="mrr">MRR<span class="arrow"></span></th>
          <th class="sortable" data-sort="invoice">Invoice<span class="arrow"></span></th>
          <th class="sortable" data-sort="binding">Binding<span class="arrow"></span></th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="9" class="state">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</main>
<script>
  const MAX_SCORE = 7;
  const SIGNAL_ORDER = ['call', 'satisfaction', 'mrr', 'invoice', 'binding', 'activityDecline', 'renewal'];
  const SIGNAL_LABELS = {
    call: 'Last called',
    satisfaction: 'Satisfaction',
    mrr: 'MRR',
    invoice: 'Invoice status',
    binding: 'Binding',
    activityDecline: 'Activity decline',
    renewal: 'Renewal soon'
  };
  const SIGNAL_TIPS = {
    call: '1 point if we have not called the customer in the last 3 months.',
    satisfaction: '1 point if the satisfaction is Red.',
    mrr: '1 point if the customer pays less than 1.000 DKK per month.',
    invoice: '1 point if the customer has an unpaid invoice right now.',
    binding: '1 point if the customer is not in a binding period.',
    activityDecline: '1 point if the average activity over the last 3 months has dropped compared to the 3 months before.',
    renewal: '1 point if the subscription ends within the next 3 months and the customer is no longer in binding.'
  };

  const tbody = document.getElementById('tbody');
  const stats = document.getElementById('stats');
  const search = document.getElementById('search');
  const refreshBtn = document.getElementById('refresh');
  const toggleExcludedBtn = document.getElementById('toggleExcluded');
  const toggleEndingBtn = document.getElementById('toggleEnding');
  const excludedCountEl = document.getElementById('excludedCount');
  const endingCountEl = document.getElementById('endingCount');

  let all = [];
  let sortState = { key: 'score', dir: 'desc' };
  let showExcluded = false;
  let showEnding = false;
  let statsCounts = null;

  const hasEndDate = c => !!c.endDate;

  const SAT_RANK = { Red: 3, Yellow: 2, null: 1, Green: 0 };

  const SORT_EXTRACTORS = {
    score:        c => c.priority.total,
    name:         c => (c.customerName || '').toLowerCase(),
    lastCall:     c => c.lastCallDate ? new Date(c.lastCallDate).getTime() : -Infinity,
    satisfaction: c => SAT_RANK[c.satisfactionScore === null ? 'null' : c.satisfactionScore] ?? 1,
    mrr:          c => c.mrr || 0,
    invoice:      c => c.invoiceStatus === 'has_unpaid' ? 1 : 0,
    binding:      c => {
      const end = c.bindingPeriod && c.bindingPeriod.end;
      return end && new Date(end).getTime() > Date.now() ? 1 : 0;
    }
  };

  const DEFAULT_DIR = {
    score: 'desc', name: 'asc', lastCall: 'asc', satisfaction: 'desc',
    mrr: 'desc', invoice: 'desc', binding: 'asc'
  };

  function sortItems(items) {
    const extract = SORT_EXTRACTORS[sortState.key];
    const mul = sortState.dir === 'asc' ? 1 : -1;
    return [...items].sort((a, b) => {
      const av = extract(a);
      const bv = extract(b);
      if (typeof av === 'string') return av.localeCompare(bv) * mul;
      return (av - bv) * mul;
    });
  }

  function updateSortIndicators() {
    document.querySelectorAll('thead th.sortable').forEach(th => {
      const key = th.dataset.sort;
      const arrow = th.querySelector('.arrow');
      if (key === sortState.key) {
        th.classList.add('active');
        arrow.textContent = sortState.dir === 'asc' ? '▲' : '▼';
      } else {
        th.classList.remove('active');
        arrow.textContent = '▼';
      }
    });
  }

  const fmtMRR = v => v == null ? '—' :
    new Intl.NumberFormat('da-DK', { style: 'currency', currency: 'DKK', maximumFractionDigits: 0 }).format(v);

  function daysSince(iso) {
    if (!iso) return null;
    return Math.floor((Date.now() - new Date(iso).getTime()) / 86_400_000);
  }

  function lastCallCell(iso) {
    const d = daysSince(iso);
    if (d == null) return '<span class="pill pill-never">Never</span>';
    const date = new Date(iso).toLocaleDateString('da-DK');
    const cls = d > 90 ? 'pill-old' : 'pill-recent';
    return `<span class="pill ${cls}">${d}d</span> <span class="since">${date}</span>`;
  }

  function satisfactionCell(s) {
    const map = { Red: 'dot-red', Yellow: 'dot-yellow', Green: 'dot-green' };
    const cls = map[s] || 'dot-none';
    const label = s || 'Unknown';
    return `<span class="dot ${cls}" title="${label}"></span>`;
  }

  function invoiceCell(status) {
    if (status === 'has_unpaid') return '<span class="pill pill-unpaid">Unpaid</span>';
    return '<span class="muted">Paid</span>';
  }

  function bindingCell(bp) {
    const end = bp && bp.end;
    const active = end && new Date(end).getTime() > Date.now();
    if (!active) return '<span class="muted">—</span>';
    const endDate = new Date(end).toLocaleDateString('da-DK');
    return `<span class="pill pill-bound" title="Ends ${endDate}">Active</span>`;
  }

  function scoreClass(total) {
    if (total >= 4) return 'score-hi';
    if (total >= 2) return 'score-md';
    return 'score-lo';
  }

  function escape(s) {
    return String(s ?? '').replace(/[&<>"']/g, c =>
      ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  function signalsHtml(breakdown) {
    return SIGNAL_ORDER.map(k => {
      const v = breakdown[k] || 0;
      const tip = SIGNAL_TIPS[k]
        ? `<span class="info" data-tip="${escape(SIGNAL_TIPS[k])}"></span>`
        : '';
      const mark = v ? '<span class="signal-mark hit">✓</span>' : '<span class="signal-mark miss">·</span>';
      return `
        <div class="signal-row ${v ? 'hit' : 'miss'}">
          ${mark}
          <span class="signal-label">${SIGNAL_LABELS[k]}${tip}</span>
        </div>
      `;
    }).join('');
  }

  function breakdownRow(c) {
    return `
      <tr class="breakdown-row"><td colspan="9">
        <div class="breakdown">
          <h4>Score breakdown — total ${c.priority.total} / ${MAX_SCORE}</h4>
          <div class="signals">${signalsHtml(c.priority.breakdown)}</div>
        </div>
      </td></tr>
    `;
  }

  function actionCell(c) {
    if (c.doNotContact) {
      const tip = c.doNotContactReason
        ? `Restore to call list — excluded: ${c.doNotContactReason.replace(/"/g, '&quot;')}`
        : 'Restore to call list';
      return `<td class="action"><button class="row-action restore" data-action="restore" title="${tip}">↺</button></td>`;
    }
    return `<td class="action"><button class="row-action" data-action="exclude" title="Exclude from call list">×</button></td>`;
  }

  function render(items) {
    if (!items.length) {
      tbody.innerHTML = '<tr><td colspan="9" class="state">No customers match.</td></tr>';
      return;
    }
    tbody.innerHTML = items.map((c, i) => {
      const cls = c.doNotContact ? 'excluded' : '';
      const rankCell = showExcluded || showEnding ? '—' : i + 1;
      return `
      <tr data-idx="${i}" class="${cls}">
        <td class="rank">${rankCell}</td>
        <td><span class="score ${scoreClass(c.priority.total)}">${c.priority.total}</span></td>
        <td class="name">${escape(c.customerName)}${c.doNotContact && c.doNotContactReason ? `<span class="excluded-note">${escape(c.doNotContactReason)}</span>` : c.doNotContact ? '<span class="excluded-note"></span>' : ''}</td>
        <td>${lastCallCell(c.lastCallDate)}</td>
        <td>${satisfactionCell(c.satisfactionScore)}</td>
        <td class="mrr">${fmtMRR(c.mrr)}</td>
        <td>${invoiceCell(c.invoiceStatus)}</td>
        <td>${bindingCell(c.bindingPeriod)}</td>
        ${actionCell(c)}
      </tr>
    `;
    }).join('');

    tbody.querySelectorAll('tr[data-idx]').forEach(tr => {
      tr.addEventListener('click', e => {
        if (e.target.closest('.row-action')) return;
        const idx = +tr.dataset.idx;
        const next = tr.nextElementSibling;
        if (next && next.classList.contains('breakdown-row')) {
          next.remove();
          tr.classList.remove('expanded');
          return;
        }
        tbody.querySelectorAll('.breakdown-row').forEach(r => {
          r.previousElementSibling?.classList.remove('expanded');
          r.remove();
        });
        tr.classList.add('expanded');
        tr.insertAdjacentHTML('afterend', breakdownRow(items[idx]));
      });
    });

    tbody.querySelectorAll('.row-action').forEach(btn => {
      btn.addEventListener('click', async e => {
        e.stopPropagation();
        const tr = btn.closest('tr');
        const idx = +tr.dataset.idx;
        const customer = items[idx];
        const action = btn.dataset.action;
        const body = { customerName: customer.customerName };
        if (action === 'exclude') {
          const reason = (prompt(`Exclude "${customer.customerName}" from the call list.\n\nWhy are we excluding this customer?`) || '').trim();
          if (!reason) return;
          body.reason = reason;
        } else {
          if (!confirm(`Restore "${customer.customerName}" to the call list?`)) return;
        }
        try {
          const res = await fetch('/api/do-not-contact', {
            method: action === 'exclude' ? 'POST' : 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error || `HTTP ${res.status}`);
          }
          await load();
        } catch (err) {
          alert(`Failed: ${err.message}`);
        }
      });
    });
  }

  function applyFilter() {
    const q = search.value.trim().toLowerCase();
    let scope;
    if (showExcluded) scope = all.filter(c => c.doNotContact);
    else if (showEnding) scope = all.filter(c => !c.doNotContact && hasEndDate(c));
    else scope = all.filter(c => !c.doNotContact && !hasEndDate(c));
    const base = q
      ? scope.filter(c =>
          (c.customerName || '').toLowerCase().includes(q) ||
          (c.sites || []).some(s => s.toLowerCase().includes(q)))
      : scope;
    if (showExcluded) {
      stats.textContent = `Viewing ${scope.length} excluded ${scope.length === 1 ? 'customer' : 'customers'}`;
    } else if (showEnding) {
      stats.textContent = `Viewing ${scope.length} customers with an end date`;
    } else if (statsCounts) {
      const { total, never, red, unpaid, highScore } = statsCounts;
      stats.textContent = [
        `${total} customers`,
        `${never} never called`,
        `${red} red`,
        `${unpaid} unpaid`,
        `${highScore} scoring 4+`
      ].join(' · ');
    }
    render(sortItems(base));
  }

  async function load() {
    tbody.innerHTML = '<tr><td colspan="9" class="state">Loading…</td></tr>';
    stats.textContent = '';
    try {
      const res = await fetch('/api/customers');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      all = data.items;
      const callList = all.filter(c => !c.doNotContact && !hasEndDate(c));
      const never = callList.filter(c => !c.lastCallDate).length;
      const red = callList.filter(c => c.satisfactionScore === 'Red').length;
      const unpaid = callList.filter(c => c.invoiceStatus === 'has_unpaid').length;
      const highScore = callList.filter(c => c.priority.total >= 4).length;
      statsCounts = { total: callList.length, never, red, unpaid, highScore };
      const endingCount = all.filter(c => !c.doNotContact && hasEndDate(c)).length;
      excludedCountEl.textContent = data.excludedCount || 0;
      endingCountEl.textContent = endingCount;
      toggleExcludedBtn.style.display = data.excludedCount > 0 || showExcluded ? '' : 'none';
      toggleEndingBtn.style.display = endingCount > 0 || showEnding ? '' : 'none';
      applyFilter();
    } catch (err) {
      tbody.innerHTML = `<tr><td colspan="9" class="state error">Failed to load: ${escape(err.message)}</td></tr>`;
    }
  }

  search.addEventListener('input', applyFilter);
  refreshBtn.addEventListener('click', load);

  toggleExcludedBtn.addEventListener('click', () => {
    showExcluded = !showExcluded;
    if (showExcluded) {
      showEnding = false;
      toggleEndingBtn.classList.remove('active');
      toggleEndingBtn.title = 'Show customers with an end date set';
    }
    toggleExcludedBtn.classList.toggle('active', showExcluded);
    toggleExcludedBtn.title = showExcluded
      ? 'Back to the call list'
      : 'Show customers excluded from the call list';
    applyFilter();
  });

  toggleEndingBtn.addEventListener('click', () => {
    showEnding = !showEnding;
    if (showEnding) {
      showExcluded = false;
      toggleExcludedBtn.classList.remove('active');
      toggleExcludedBtn.title = 'Show customers excluded from the call list';
    }
    toggleEndingBtn.classList.toggle('active', showEnding);
    toggleEndingBtn.title = showEnding
      ? 'Back to the call list'
      : 'Show customers with an end date set';
    applyFilter();
  });

  document.querySelectorAll('thead th.sortable').forEach(th => {
    th.addEventListener('click', () => {
      const key = th.dataset.sort;
      if (sortState.key === key) {
        sortState.dir = sortState.dir === 'asc' ? 'desc' : 'asc';
      } else {
        sortState.key = key;
        sortState.dir = DEFAULT_DIR[key];
      }
      updateSortIndicators();
      applyFilter();
    });
  });

  updateSortIndicators();
  load();
</script>
</body>
</html>
